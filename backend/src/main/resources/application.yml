server:
  port: 8080

spring:
  application:
    name: jwellkeeper-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/jwellkeeper?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR
        format_sql: true
    open-in-view: false

security:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-production-secret-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

app:
  storage:
    root: ${STORAGE_ROOT:storage}
  qr:
    secret: ${QR_SIGNING_SECRET:change-me-to-a-separate-qr-signing-secret-32-bytes}
    image-size: ${QR_IMAGE_SIZE:300}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.jwellkeeper: INFO
